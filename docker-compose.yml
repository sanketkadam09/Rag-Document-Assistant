version: "3.9"

services:

  db:
    image: pgvector/pgvector:pg15
    container_name: rag_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sanketkadam09122003
      POSTGRES_DB: rag_assistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  
  redis:
    image: redis:7
    container_name: rag_redis
    ports:
       - "6379:6379"
    restart: always   

  backend:
    build: ./backend
    container_name: rag_backend
    ports:
      - "5000:5000"
    restart: always
    depends_on:
      - db
      - redis
    env_file:
       - ./backend/.env  
    environment:
      DATABASE_URL: postgresql://postgres:sanketkadam09122003@db:5432/rag_assistant
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: rag_frontend
    ports:
      - "5173:80"   # host 5173 → container 80
    restart: always
    depends_on:
      - backend

volumes:
  pgdata:
  uploads: